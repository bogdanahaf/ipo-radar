name: IPO Radar

on:
  workflow_dispatch:
    inputs:
      alert_type:
        description: >-
          sync/none = Alpha Vantage refresh + commit data + deploy Pages (no Telegram).
          tomorrow/today/week/both = same pipeline + Telegram (needs bot secrets).
          ping = Telegram only (skips Alpha Vantage refresh).
        required: true
        default: sync
        type: choice
        options:
          - sync
          - none
          - ping
          - today
          - tomorrow
          - week
          - both
      dry_run:
        description: Print alert text without posting to Telegram
        required: true
        default: false
        type: boolean
      week_preview:
        description: >-
          For manual "week" only (default on) — send the digest but do not write alert-state,
          so the scheduled Sunday job for the same Mon–Sun window can still run. Turn off only
          if you intentionally want this manual run to replace Sunday for that week.
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "30 12,13 * * 1-5"
    - cron: "30 20,21 * * 1-5"
    - cron: "0 21 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ipo-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # Keeps older JavaScript actions (Pages, artifacts) on a supported runtime; see GitHub Actions changelog.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      # Ping-only manual runs skip Alpha Vantage so Telegram can be tested without a key or when the API is rate-limited.
      - name: Refresh IPO data
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.alert_type == 'ping') }}
        run: npm run refresh
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          IPO_WATCHLIST: ${{ vars.IPO_WATCHLIST }}

      - name: Send scheduled morning alert
        if: github.event_name == 'schedule' && github.event.schedule == '30 12,13 * * 1-5'
        run: npm run alert -- --type today
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPO_RADAR_SITE_URL: ${{ vars.IPO_RADAR_SITE_URL }}
          IPO_HYPE_THRESHOLD: ${{ vars.IPO_HYPE_THRESHOLD }}
          IPO_AV_TIME_SERIES_DELAY_MS: ${{ vars.IPO_AV_TIME_SERIES_DELAY_MS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_RESPONSES_MODEL: ${{ vars.OPENAI_RESPONSES_MODEL }}
          OPENAI_WEB_SEARCH: ${{ vars.OPENAI_WEB_SEARCH }}

      - name: Send scheduled next-day alert
        if: github.event_name == 'schedule' && github.event.schedule == '30 20,21 * * 1-5'
        run: npm run alert -- --type tomorrow
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPO_RADAR_SITE_URL: ${{ vars.IPO_RADAR_SITE_URL }}
          IPO_AV_TIME_SERIES_DELAY_MS: ${{ vars.IPO_AV_TIME_SERIES_DELAY_MS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_RESPONSES_MODEL: ${{ vars.OPENAI_RESPONSES_MODEL }}
          OPENAI_WEB_SEARCH: ${{ vars.OPENAI_WEB_SEARCH }}

      - name: Send Sunday week digest
        if: github.event_name == 'schedule' && github.event.schedule == '0 21 * * 0'
        run: npm run alert -- --type week
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPO_RADAR_SITE_URL: ${{ vars.IPO_RADAR_SITE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_RESPONSES_MODEL: ${{ vars.OPENAI_RESPONSES_MODEL }}
          OPENAI_WEB_SEARCH: ${{ vars.OPENAI_WEB_SEARCH }}

      - name: Require Telegram secrets for manual alerts
        if: github.event_name == 'workflow_dispatch' && inputs.alert_type != 'none' && inputs.alert_type != 'sync'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN is empty. Add it under Settings → Secrets and variables → Actions → Repository secrets (not Variables)."
            exit 1
          fi
          if [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "::error::TELEGRAM_CHAT_ID is empty. Add it as a Repository secret with @YourChannel or the numeric id (not Variables)."
            exit 1
          fi

      - name: Verify Telegram chat (getChat)
        if: github.event_name == 'workflow_dispatch' && inputs.alert_type != 'none' && inputs.alert_type != 'sync'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          chat="$(node --input-type=module -e "import { normalizeTelegramChatId } from './scripts/lib/telegram.js'; process.stdout.write(normalizeTelegramChatId(process.env.TELEGRAM_CHAT_ID));")"
          resp="$(curl -sS -G "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getChat" --data-urlencode "chat_id=${chat}")"
          ok="$(printf '%s' "$resp" | jq -r .ok)"
          if [ "$ok" != "true" ]; then
            echo "::error::Telegram getChat failed (fix TELEGRAM_CHAT_ID or add this bot as channel admin). Response: $(printf '%s' "$resp" | jq -c '{ok,error_code,description}')"
            exit 1
          fi

      - name: Send manual alert
        if: github.event_name == 'workflow_dispatch' && inputs.alert_type != 'none' && inputs.alert_type != 'sync'
        shell: bash
        run: |
          extra=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            extra="--dry-run"
          fi
          week_preview_flag=""
          if [ "${{ inputs.week_preview }}" = "true" ]; then
            week_preview_flag="--week-preview"
          fi

          case "${{ inputs.alert_type }}" in
            sync|none)
              echo "Data + Pages only (no Telegram in this step)."
              ;;
            ping)
              npm run alert -- --type ping $extra
              ;;
            today)
              npm run alert -- --type today $extra
              ;;
            tomorrow)
              npm run alert -- --type tomorrow $extra
              ;;
            week)
              npm run alert -- --type week $extra $week_preview_flag
              ;;
            both)
              npm run alert -- --type today $extra
              npm run alert -- --type tomorrow $extra
              ;;
          esac
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPO_RADAR_SITE_URL: ${{ vars.IPO_RADAR_SITE_URL }}
          IPO_HYPE_THRESHOLD: ${{ vars.IPO_HYPE_THRESHOLD }}
          IPO_AV_TIME_SERIES_DELAY_MS: ${{ vars.IPO_AV_TIME_SERIES_DELAY_MS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_RESPONSES_MODEL: ${{ vars.OPENAI_RESPONSES_MODEL }}
          OPENAI_WEB_SEARCH: ${{ vars.OPENAI_WEB_SEARCH }}

      - name: Commit updated data and alert state
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ipos.json docs/data/alert-state.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update IPO Radar data"
            branch="${GITHUB_REF_NAME:-main}"
            pushed=0
            for attempt in 1 2 3 4 5 6; do
              if git push; then
                pushed=1
                break
              fi
              echo "Push rejected or failed (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
              git fetch origin "${branch}"
              git rebase "origin/${branch}" || {
                echo "::error::Rebase onto origin/${branch} failed (likely a conflict on data files). Resolve on main manually."
                exit 1
              }
            done
            if [ "${pushed}" != "1" ]; then
              echo "::error::git push failed after retries."
              exit 1
            fi
          fi

      - name: Configure Pages
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        id: deployment
        uses: actions/deploy-pages@v4
